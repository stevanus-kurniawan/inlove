services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tribute
      POSTGRES_PASSWORD: tribute
      POSTGRES_DB: tribute
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tribute -d tribute"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5440:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    environment:
      DATABASE_URL: postgresql://tribute:tribute@db:5432/tribute
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      # Override in .env or compose override — must be set for admin login
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-change-me-use-openssl-rand-hex-32}
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
